
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>warzone2026</title>
  </head>
  <body>
    <div id="game-shell">
      <h1 id="game-title">Warzone 2026: Purging The Viper's Nest</h1>
      <div id="app"></div>
      <div id="hud" aria-live="polite">
        <div id="hud-lives">Lives: 3</div>
        <div id="hud-kills">Vipers Eliminated: 0/100</div>
        <div id="hud-status">Mission #1 - Eliminate 3 Vipers</div>
        <label class="hud-volume" for="hud-vol-sfx">
          SFX
          <input id="hud-vol-sfx" type="range" min="0" max="1" step="0.01" value="0.78" />
        </label>
        <label class="hud-volume" for="hud-vol-music">
          Music
          <input id="hud-vol-music" type="range" min="0" max="1" step="0.01" value="0.45" />
        </label>
      </div>
      <div id="hud-hint">R - Restart</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
